        }
    }
    
    // 改造后的 saveToLocal: 保留本地存储 + 触发远程同步 (原业务中多处调用，保持兼容)
    async function saveToLocal() {
        // 立即更新 localStorage 作为离线回退
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        // 异步同步云端，不等待
        syncToRemote().catch(e => console.warn);
    }
    
    // 改造后的 loadData: 优先远端，失败则读本地或默认
    async function loadData() {
        try {
            // 尝试从 Supabase 拉取数据
            const { data, error } = await supabaseClient.from('assets').select('data').eq('id', REMOTE_ID).single();
            if (!error && data && data.data) {
                const remoteData = JSON.parse(data.data);
                if (remoteData.links && remoteData.collections) {
                    appData = remoteData;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
                    console.log("✅ 从云端同步数据成功");
                    return;
                } else {
                    throw new Error("数据结构不完整");
                }
            } else {
                // 无远端记录 或 记录为空
                console.log("云端无数据，准备初始化");
            }
        } catch (err) {
            console.warn("拉取云端数据失败，尝试本地回退", err);
            showToast("网络波动，使用本地缓存数据", true);
        }
        // 降级方案: 读取 localStorage
        const localRaw = localStorage.getItem(STORAGE_KEY);
        if (localRaw) {
            try {
                const localData = JSON.parse(localRaw);
                if (localData.links && localData.collections) {
                    appData = localData;
                    console.log("从本地缓存加载数据");
                    return;
                }
            } catch(e) {}
        }
        // 全新初始化
        initDefault();
        // 将默认数据推送到云端
        await syncToRemote();
        console.log("初始化默认数据并同步云端");
    }
    
    function initDefault() {
        appData = { links: JSON.parse(JSON.stringify(defaultLinks)), collections: JSON.parse(JSON.stringify(defaultCollections)) };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }
    
    function filterLinks(linksArr, kw) {
        if (!kw.trim()) return linksArr;
        const lower = kw.toLowerCase();
        return linksArr.filter(l => l.title.toLowerCase().includes(lower) || (l.description && l.description.toLowerCase().includes(lower)) || l.url.toLowerCase().includes(lower));
    }
    function filterCollectionsDeep(collections, kw) {
        if (!kw.trim()) return collections;
        const lower = kw.toLowerCase();
        return collections.filter(coll => {
            if (coll.title.toLowerCase().includes(lower)) return true;
            if (coll.description && coll.description.toLowerCase().includes(lower)) return true;
            return coll.prompts.some(p => p.title.toLowerCase().includes(lower) || p.content.toLowerCase().includes(lower));
        });
    }
    
    // ---- 网站资源CRUD (调用saveToLocal会自动同步云端) ----
    function openLinkModal(editId = null) {
        const link = editId ? appData.links.find(l => l.id === editId) : null;
        const isEdit = !!link;
        const modalDiv = document.createElement("div"); modalDiv.className = "modal-overlay";
        modalDiv.innerHTML = `<div class="modal"><h3>${isEdit ? "编辑网站" : "新增网站"}</h3>
            <label>名称</label><input id="linkTitle" type="text" value="${escapeHtml(link?.title || '')}">
            <label>网址</label><input id="linkUrl" type="text" value="${escapeHtml(link?.url || 'https://')}">
            <label>分类</label><select id="linkCat"><option value="ai">AI工具</option><option value="video">视频资源</option><option value="websites">常用网站</option></select>
            <label>描述</label><textarea id="linkDesc" rows="3">${escapeHtml(link?.description || '')}</textarea>
            <div class="modal-buttons"><button class="btn-secondary" id="modalCancel">取消</button><button class="btn-primary" id="modalConfirm">确认</button></div></div>`;
        document.body.appendChild(modalDiv);
        const close = () => modalDiv.remove();
        modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) close(); });
        modalDiv.querySelector("#modalCancel").onclick = close;
        modalDiv.querySelector("#modalConfirm").onclick = async () => {
            const title = document.getElementById("linkTitle").value.trim();
            const url = document.getElementById("linkUrl").value.trim();
            const category = document.getElementById("linkCat").value;
            const description = document.getElementById("linkDesc").value;
            if (!title || !url) { alert("请填写名称和网址"); return; }
            if (isEdit) { link.title = title; link.url = url; link.category = category; link.description = description; }
            else { appData.links.push({ id: Date.now().toString(), title, url, category, description }); }
            await saveToLocal(); close(); renderMainView();
        };
    }
    function deleteLinkById(id) { if(confirm("永久删除该网站？")) { appData.links = appData.links.filter(l => l.id !== id); saveToLocal(); renderMainView(); } }
    function openCollectionModal(editId = null) { 
        const coll = editId ? appData.collections.find(c => c.id === editId) : null;
        const modalDiv = document.createElement("div"); modalDiv.className = "modal-overlay";
        modalDiv.innerHTML = `<div class="modal"><h3>${coll ? "编辑合集" : "新建合集"}</h3><label>合集名称</label><input id="colTitle" value="${escapeHtml(coll?.title || '')}"><label>描述</label><textarea id="colDesc">${escapeHtml(coll?.description || '')}</textarea><div class="modal-buttons"><button class="btn-secondary" id="modalCancel">取消</button><button class="btn-primary" id="modalConfirm">确认</button></div></div>`;
        document.body.appendChild(modalDiv);
        const close = () => modalDiv.remove();
        modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) close(); });
        modalDiv.querySelector("#modalCancel").onclick = close;
        modalDiv.querySelector("#modalConfirm").onclick = async () => {
            const title = document.getElementById("colTitle").value.trim();
            if(!title){ alert("名称不能为空"); return; }
            if(coll){ coll.title = title; coll.description = document.getElementById("colDesc").value; }
            else { appData.collections.push({ id: "col_"+Date.now(), title, description: document.getElementById("colDesc").value, prompts: [] }); }
            await saveToLocal(); close(); renderMainView();
        };
    }
    function deleteCollectionById(id) { if(confirm("删除合集将清空其中所有Prompt，确认吗？")) { appData.collections = appData.collections.filter(c => c.id !== id); saveToLocal(); if(detailActive && activeCollectionId === id) backToMain(); else renderMainView(); } }
    
    // Prompt 媒体管理 (保留原功能)
    function openPromptModal(collectionId, promptId = null) {
        const coll = appData.collections.find(c => c.id === collectionId);
        if (!coll) return;
        const prompt = promptId ? coll.prompts.find(p => p.id === promptId) : null;
        let mediaArr = prompt ? (prompt.media || []) : [];
        const renderMediaUI = () => { const container = document.getElementById("mediaGridContainer"); if(!container) return; if(!mediaArr.length) { container.innerHTML = '<div style="color:#94a3b8; padding: 8px;">暂无媒体，添加上限5个</div>'; return; } let html = '<div class="media-grid">'; mediaArr.forEach((med, idx) => { html += `<div class="media-item" data-idx="${idx}">${med.type==='image'?`<img src="${escapeHtml(med.url)}" />`:`<video src="${escapeHtml(med.url)}"></video>`}<span class="remove-media" data-idx="${idx}"><i class="fas fa-times-circle"></i></span></div>`; }); html += '</div>'; container.innerHTML = html; document.querySelectorAll(".remove-media").forEach(btn => { btn.onclick = (e) => { const idx = parseInt(btn.dataset.idx); if(!isNaN(idx)) { mediaArr.splice(idx,1); renderMediaUI(); } }; }); };
        const modalDiv = document.createElement("div"); modalDiv.className = "modal-overlay";
        modalDiv.innerHTML = `<div class="modal"><h3>${prompt ? "编辑Prompt" : "新增Prompt"}</h3><label>标题</label><input id="promptTitle" value="${escapeHtml(prompt?.title || '')}"><label>内容</label><textarea id="promptContent" rows="5">${escapeHtml(prompt?.content || '')}</textarea><div class="media-manager"><label>效果素材 (最多5个)</label><div id="mediaGridContainer"></div><button type="button" id="addMediaBtn" class="btn-secondary">+ 添加媒体</button></div><div class="modal-buttons"><button class="btn-secondary" id="modalCancel">取消</button><button class="btn-primary" id="modalConfirm">确认</button></div></div>`;
        document.body.appendChild(modalDiv);
        const closeModal = () => modalDiv.remove();
        modalDiv.addEventListener('click', (e) => { if(e.target === modalDiv) closeModal(); });
        document.getElementById("modalCancel").onclick = closeModal;
        renderMediaUI();
        document.getElementById("addMediaBtn").onclick = () => { if(mediaArr.length>=5){ alert("最多5个"); return; } const input = document.createElement("input"); input.type="file"; input.accept="image/*,video/*"; input.onchange = (e) => { const file=e.target.files[0]; if(!file) return; const type = file.type.startsWith("image/")?"image":file.type.startsWith("video/")?"video":null; if(!type) return; const reader=new FileReader(); reader.onload=(ev)=>{ mediaArr.push({type,url:ev.target.result}); renderMediaUI(); }; reader.readAsDataURL(file); }; input.click(); };
        document.getElementById("modalConfirm").onclick = async () => {
            const newTitle = document.getElementById("promptTitle").value.trim();
            const newContent = document.getElementById("promptContent").value.trim();
            if(!newTitle || !newContent){ alert("标题和内容不能为空"); return; }
            if(prompt){ prompt.title=newTitle; prompt.content=newContent; prompt.media=mediaArr; }
            else { coll.prompts.push({ id:"p_"+Date.now()+"_"+Math.random().toString(36).substr(2,6), title:newTitle, content:newContent, media:mediaArr }); }
            await saveToLocal();
            if(detailActive && activeCollectionId===collectionId) renderDetailView(coll, currentSearchKeyword);
            else renderMainView();
            closeModal();
        };
    }
    
    // 全文悬浮窗 (保留媒体轮播)
    function showFulltextModal(title, content, mediaList = []) {
        if (activeSwiperInterval) clearInterval(activeSwiperInterval);
        const modalDiv = document.createElement("div"); modalDiv.className = "modal-overlay fulltext-modal";
        let slidesHtml = '', indicatorsHtml = '';
        const medias = mediaList || [];
        for (let i = 0; i < medias.length; i++) {
            const m = medias[i];
            const activeClass = i === 0 ? 'active' : '';
            if (m.type === 'image') slidesHtml += `<div class="swiper-slide ${activeClass}"><img src="${escapeHtml(m.url)}" loading="lazy" /></div>`;
            else slidesHtml += `<div class="swiper-slide ${activeClass}"><video controls src="${escapeHtml(m.url)}"></video></div>`;
            indicatorsHtml += `<span class="indicator ${i === 0 ? 'active' : ''}" data-index="${i}"></span>`;
        }
        const hasMedia = medias.length > 0;
        const mediaSection = hasMedia ? `
            <div class="media-swiper">
                <div class="swiper-container">
                    <div class="swiper-track" id="swiperTrack">${slidesHtml}</div>
                    ${medias.length > 1 ? `<button class="swiper-arrow swiper-arrow-left"><i class="fas fa-chevron-left"></i></button><button class="swiper-arrow swiper-arrow-right"><i class="fas fa-chevron-right"></i></button>` : ''}
                </div>
                ${medias.length > 1 ? `<div class="swiper-indicators" id="swiperIndicators">${indicatorsHtml}</div>` : ''}
            </div>
        ` : `<div class="media-swiper"><div class="empty-media-placeholder"><i class="fas fa-image fa-2x"></i><span>暂无效果素材</span></div></div>`;
        modalDiv.innerHTML = `<div class="modal"><div class="note-scroll-container">${mediaSection}<div class="note-text"><div class="note-header"><h3><i class="fas fa-pen-fancy" style="margin-right: 8px;"></i> ${escapeHtml(title)}</h3><button class="close-x" id="closeNoteModalBtn"><i class="fas fa-times"></i></button></div><div class="prompt-full-content">${escapeHtml(content)}</div><div class="note-actions"><button class="close-note-btn" id="closeNoteFooterBtn"><i class="fas fa-chevron-left"></i> 关闭</button><button class="copy-note-btn" id="copyNoteFullBtn"><i class="fas fa-copy"></i> 复制全文</button></div></div></div></div>`;
        document.body.appendChild(modalDiv);
        const close = () => { if(activeSwiperInterval) clearInterval(activeSwiperInterval); modalDiv.remove(); };
        modalDiv.querySelector("#closeNoteModalBtn")?.addEventListener("click", close);
        modalDiv.querySelector("#closeNoteFooterBtn")?.addEventListener("click", close);
        modalDiv.querySelector("#copyNoteFullBtn")?.addEventListener("click", () => { navigator.clipboard.writeText(content).then(()=>alert("✅ 已复制Prompt全文")); });
        modalDiv.addEventListener("click", (e) => { if(e.target === modalDiv) close(); });
        if (hasMedia && medias.length > 1) { 
            const left = modalDiv.querySelector(".swiper-arrow-left");
            const right = modalDiv.querySelector(".swiper-arrow-right");
            const indicators = modalDiv.querySelectorAll(".indicator");
            const slides = modalDiv.querySelectorAll(".swiper-slide");
            let currentIdx = 0;
            const updateSlide = (idx) => { if(idx<0) idx=0; if(idx>=slides.length) idx=slides.length-1; currentIdx=idx; slides.forEach((s,i)=> s.classList.toggle('active', i===currentIdx)); indicators.forEach((ind,i)=> ind.classList.toggle('active', i===currentIdx)); };
            const next = () => { if(slides.length) updateSlide((currentIdx+1)%slides.length); };
            const prev = () => { if(slides.length) updateSlide((currentIdx-1+slides.length)%slides.length); };
            left?.addEventListener('click', (e) => { e.stopPropagation(); if(activeSwiperInterval) clearInterval(activeSwiperInterval); activeSwiperInterval=null; prev(); });
            right?.addEventListener('click', (e) => { e.stopPropagation(); if(activeSwiperInterval) clearInterval(activeSwiperInterval); activeSwiperInterval=null; next(); });
            indicators.forEach(ind => ind.addEventListener('click', (e) => { if(activeSwiperInterval) clearInterval(activeSwiperInterval); activeSwiperInterval=null; updateSlide(parseInt(ind.dataset.index)); }));
            activeSwiperInterval = setInterval(() => next(), 4500);
        }
    }
    
    // 视图渲染函数（与原始逻辑一致，集成全文调用）
    function renderDetailView(collection, searchKw = "") { 
        const detailDiv = document.getElementById("detailView");
        let prompts = collection.prompts || [];
        if (searchKw.trim()) { const lower = searchKw.toLowerCase(); prompts = prompts.filter(p => p.title.toLowerCase().includes(lower) || p.content.toLowerCase().includes(lower)); }
        let cardsHtml = '';
        prompts.forEach(p => {
            const mediaList = p.media || [];
            const thumbHtml = mediaList.length ? `<div class="prompt-media-preview">${mediaList.slice(0,2).map(m => m.type==='image'?`<img class="mini-thumb" src="${escapeHtml(m.url)}" />`:`<video class="mini-thumb" src="${escapeHtml(m.url)}"></video>`).join('')}${mediaList.length>2?`<span class="mini-thumb">+${mediaList.length-2}</span>`:''}</div>` : '';
            cardsHtml += `<div class="prompt-card"><div class="prompt-card-header"><span class="prompt-card-title">${escapeHtml(p.title)}</span><div><button class="icon-btn edit-prompt" data-pid="${p.id}"><i class="fas fa-edit"></i></button><button class="icon-btn copy-prompt" data-content="${escapeHtml(p.content)}"><i class="fas fa-copy"></i></button><button class="icon-btn delete-prompt" data-pid="${p.id}"><i class="fas fa-trash-alt"></i></button></div></div><div class="collapsed-preview">${escapeHtml(p.content.length>100 ? p.content.substring(0,100)+'…' : p.content)}</div>${thumbHtml}<button class="expand-full-btn" data-title="${escapeHtml(p.title)}" data-content="${escapeHtml(p.content)}" data-media='${JSON.stringify(mediaList).replace(/'/g, "&#39;")}'><i class="fas fa-expand-alt"></i> 展开全文</button></div>`;
        });
        detailDiv.innerHTML = `<div class="back-bar"><button class="back-btn" id="backToMainBtn"><i class="fas fa-arrow-left"></i> 返回合集库</button><h2>📁 ${escapeHtml(collection.title)}</h2><button class="add-btn" id="addPromptBtn"><i class="fas fa-plus"></i> 新增Prompt</button></div><div class="prompts-gallery">${cardsHtml || '<div class="empty-placeholder">暂无匹配Prompt</div>'}</div>`;
        document.getElementById("backToMainBtn").onclick = backToMain;
        document.getElementById("addPromptBtn").onclick = () => openPromptModal(collection.id);
        document.querySelectorAll(".edit-prompt").forEach(btn => btn.onclick = () => openPromptModal(collection.id, btn.dataset.pid));
        document.querySelectorAll(".delete-prompt").forEach(btn => btn.onclick = () => { if(confirm("永久删除？")){ const coll = appData.collections.find(c=>c.id===collection.id); if(coll){ coll.prompts = coll.prompts.filter(p=>p.id!==btn.dataset.pid); saveToLocal(); renderDetailView(coll, currentSearchKeyword); } } });
        document.querySelectorAll(".copy-prompt").forEach(btn => btn.onclick = () => navigator.clipboard.writeText(btn.dataset.content).then(()=>alert("已复制")));
        document.querySelectorAll(".expand-full-btn").forEach(btn => { btn.onclick = () => { let media=[]; try{ media=JSON.parse(btn.dataset.media); }catch(e){} showFulltextModal(btn.dataset.title, btn.dataset.content, media); }; });
    }
    function backToMain() { detailActive=false; document.getElementById("mainView").style.display="block"; document.getElementById("detailView").style.display="none"; renderMainView(); }
    function openDetailView(collectionId) { const coll = appData.collections.find(c=>c.id===collectionId); if(coll){ detailActive=true; activeCollectionId=collectionId; document.getElementById("mainView").style.display="none"; document.getElementById("detailView").style.display="block"; renderDetailView(coll, currentSearchKeyword); } }
    function renderMainView() { if(detailActive) return; const mainDiv = document.getElementById("mainView"); const kw = currentSearchKeyword; if (currentNav === "promptlib") { let filtered = filterCollectionsDeep(appData.collections, kw); mainDiv.innerHTML = `<div class="section-header"><h2><i class="fas fa-layer-group"></i> 所有Prompt合集</h2><button class="add-btn" id="addCollectionBtn"><i class="fas fa-plus"></i> 新建合集</button></div><div class="cards-grid">${filtered.map(c => `<div class="card"><div class="card-header"><span class="card-title">${escapeHtml(c.title)}</span><div><button class="icon-btn edit-collection" data-id="${c.id}"><i class="fas fa-edit"></i></button><button class="icon-btn delete-collection" data-id="${c.id}"><i class="fas fa-trash"></i></button></div></div><div class="card-desc">${escapeHtml(c.description)}</div><div class="badge">📄 ${c.prompts.length} 条</div><div class="card-actions"><button class="icon-btn open-collection" data-id="${c.id}"><i class="fas fa-folder-open"></i> 查看详情</button></div></div>`).join('')}</div>`; attachCollectionEventsGlobal(); return; }
        let links = appData.links.filter(l => currentNav === 'all' ? true : l.category === currentNav); links = filterLinks(links, kw);
        mainDiv.innerHTML = `<div class="section-header"><h2><i class="fas fa-link"></i> ${currentNav==='all'?'全部网站资源':(currentNav==='ai'?'AI工具站点':(currentNav==='video'?'视频资源库':'常用网站'))}</h2><button class="add-btn" id="addSiteBtn"><i class="fas fa-plus"></i> 新增网站</button></div><div class="cards-grid">${links.map(l => `<div class="card"><div class="card-header"><span class="card-title">${escapeHtml(l.title)}</span><div><button class="icon-btn edit-link" data-id="${l.id}"><i class="fas fa-pen"></i></button><button class="icon-btn delete-link" data-id="${l.id}"><i class="fas fa-trash"></i></button></div></div><div class="card-url">${escapeHtml(l.url)}</div><div class="card-desc">${escapeHtml(l.description||'暂无备注')}</div><div class="card-actions"><button class="icon-btn open-link" data-url="${l.url}"><i class="fas fa-external-link-alt"></i> 访问</button></div></div>`).join('')}</div>`; if (currentNav === 'all') { let filteredColl = filterCollectionsDeep(appData.collections, kw); mainDiv.innerHTML += `<div class="section-header" style="margin-top:2rem;"><h2><i class="fas fa-comment-dots"></i> Prompt 合集库</h2><button class="add-btn" id="globalAddCollectionBtn"><i class="fas fa-plus"></i> 新建合集</button></div><div class="cards-grid">${filteredColl.map(c => `<div class="card"><div class="card-header"><span class="card-title">${escapeHtml(c.title)}</span><div><button class="icon-btn edit-collection-global" data-id="${c.id}"><i class="fas fa-edit"></i></button><button class="icon-btn delete-collection-global" data-id="${c.id}"><i class="fas fa-trash"></i></button></div></div><div class="card-desc">${escapeHtml(c.description)}</div><div class="badge">📄 ${c.prompts.length} 条</div><div class="card-actions"><button class="icon-btn open-collection-global" data-id="${c.id}"><i class="fas fa-folder-open"></i> 浏览</button></div></div>`).join('')}</div>`; attachGlobalCollectionEvents(); }
        document.querySelectorAll(".edit-link").forEach(btn=>btn.onclick=()=>openLinkModal(btn.dataset.id)); document.querySelectorAll(".delete-link").forEach(btn=>btn.onclick=()=>deleteLinkById(btn.dataset.id)); document.querySelectorAll(".open-link").forEach(btn=>btn.onclick=()=>window.open(btn.dataset.url,'_blank')); document.getElementById("addSiteBtn")?.addEventListener("click",()=>openLinkModal());
    }
    function attachCollectionEventsGlobal(){ document.querySelectorAll(".edit-collection").forEach(btn=>btn.onclick=()=>openCollectionModal(btn.dataset.id)); document.querySelectorAll(".delete-collection").forEach(btn=>btn.onclick=()=>deleteCollectionById(btn.dataset.id)); document.querySelectorAll(".open-collection").forEach(btn=>btn.onclick=()=>openDetailView(btn.dataset.id)); document.getElementById("addCollectionBtn")?.addEventListener("click",()=>openCollectionModal()); }
    function attachGlobalCollectionEvents(){ document.querySelectorAll(".edit-collection-global").forEach(btn=>btn.onclick=()=>openCollectionModal(btn.dataset.id)); document.querySelectorAll(".delete-collection-global").forEach(btn=>btn.onclick=()=>deleteCollectionById(btn.dataset.id)); document.querySelectorAll(".open-collection-global").forEach(btn=>btn.onclick=()=>openDetailView(btn.dataset.id)); document.getElementById("globalAddCollectionBtn")?.addEventListener("click",()=>openCollectionModal()); }
    function setActiveNav(nav) { currentNav = nav; detailActive = false; document.getElementById("mainView").style.display = "block"; document.getElementById("detailView").style.display = "none"; document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.nav === nav)); renderMainView(); }
    document.querySelectorAll(".nav-btn").forEach(btn => btn.onclick = () => setActiveNav(btn.dataset.nav));
    document.getElementById("globalSearch").addEventListener("input", (e) => { currentSearchKeyword = e.target.value.toLowerCase(); if(!detailActive) renderMainView(); else if(activeCollectionId){ const coll = appData.collections.find(c=>c.id===activeCollectionId); if(coll) renderDetailView(coll, currentSearchKeyword); } });
    
    // 启动时: 等待云端数据就绪后渲染
    (async () => {
        await loadData();
        setActiveNav("all");
    })();
</script>
